<!DOCTYPE html>
<html lang="en" class="dark">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LoRA Tag Master</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
          },
        },
      },
    }
  </script>
  <style>
    /* Custom Scrollbar for a sleek look */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: #52525b;
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #71717a;
    }

    /* Light mode scrollbar override via CSS variables if needed, but neutral gray works for both */

    /* Utility for hidden scrollbar but scrollable */
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }

    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    /* Animation for loading */
    @keyframes shimmer {
      0% {
        transform: translateX(-100%);
      }

      100% {
        transform: translateX(100%);
      }
    }

    /* Refined Scrollbar for Modals/Panels */
    .custom-scrollbar::-webkit-scrollbar {
      width: 6px;
      /* Thinner than default */
      height: 6px;
    }

    .custom-scrollbar::-webkit-scrollbar-track {
      background: transparent;
    }

    .custom-scrollbar::-webkit-scrollbar-thumb {
      background-color: rgba(113, 113, 122, 0.3);
      /* zinc-500 equivalent */
      border-radius: 9999px;
    }

    .custom-scrollbar::-webkit-scrollbar-thumb:hover {
      background-color: rgba(113, 113, 122, 0.6);
    }

    .dark .custom-scrollbar::-webkit-scrollbar-thumb {
      background-color: rgba(161, 161, 170, 0.3);
      /* zinc-400 equivalent */
    }

    .dark .custom-scrollbar::-webkit-scrollbar-thumb:hover {
      background-color: rgba(161, 161, 170, 0.6);
    }
  </style>

  <link rel="stylesheet" href="/index.css">
</head>

<body
  class="bg-zinc-50 text-zinc-900 dark:bg-zinc-900 dark:text-zinc-200 antialiased h-screen overflow-hidden selection:bg-indigo-500/30 selection:text-indigo-600 dark:selection:text-indigo-200">
  <div id="root" class="h-full"></div>
  <script type="module" src="/src/index.tsx"></script>
</body>

</html>
